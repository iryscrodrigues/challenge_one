<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="../assets/css/reset.css" />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <title>Criptografar/ Descriptografar</title>
  </head>
  <body>
    <header>
      <img class="logo" src="../assets/icons/logo.png" alt="logo alura" />
    </header>
    <main>
      <textarea class="txt_in" id="txtin" onfocus="limparCampoTexto()">
Digite o texto</textarea
      >
      <section class="rule">
        <p>⚠️Somente letras</p>
      </section>

      <section class="buttons">
        <button class="btncrip" id="cbutton">Criptografar</button>
        <button class="btndescrip" id="descbutton">Descriptografar</button>
      </section>
    </main>
    <aside>
      <img
        src="../assets/img/unicornio.png"
        id="imgaside"
        alt="desenho de unicornio"
      />

      <section class="mensagem">
        <p class="t1" id="tt1">Mensagem Criptografada/ Descriptografada ✨</p>
        <textarea class="t2" id="tt2" value="nao editavel">
Digite um texto que você deseja criptografar ou descriptografar.</textarea
        >
      </section>
      <button class="btncop" id="copbutton">Copiar</button>
    </aside>
    <footer>
      <p>All rights reserved made by Irys Rodrigues 🦄</p>
    </footer>
    <script type="text/javascript" src="../assets/js/script.js"></script>
  </body>
</html>
